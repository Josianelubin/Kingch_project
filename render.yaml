services:
  - type: web
    name: kingch
    env: python
    region: oregon
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: kingch-db
          property: connectionString
      # IMPORTANT: ajoutez manuellement CETTE variable dans le dashboard Render.
      # Vous avez deja un compte Cloudinary — utilisez vos identifiants :
      #   CLOUDINARY_URL = cloudinary://API_KEY:API_SECRET@CLOUD_NAME
      # Trouvez vos identifiants sur console.cloudinary.com (Nom du nuage,
      # Cle API, Secret de l'API -> cliquez "Reveler").
      # Sans cette variable, les photos uploadees (profil, certificats, logo)
      # seront perdues a chaque redemarrage du service.
    autoDeploy: true
    healthCheckPath: /

databases:
  - name: kingch-db
    databaseName: kingch
    user: kingch
    plan: free
    region: oregon
