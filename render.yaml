services:
  - type: web
    name: kingch
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn kingch_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: kingch-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /

databases:
  - name: kingch-db
    databaseName: kingch
    user: kingch
    plan: free
